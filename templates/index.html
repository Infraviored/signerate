<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>3D-Schild-Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #111;
      --surface: #1e1e1e;
      --border:  #333;
      --accent:  #4f9cf9;
      --danger:  #e05252;
      --success: #4caf7d;
      --text:    #e0e0e0;
      --muted:   #888;
      --radius:  8px;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: .02em; }
    h2 { font-size: 1rem; font-weight: 600; color: var(--muted); text-transform: uppercase;
         letter-spacing: .08em; margin-bottom: .75rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      width: 100%;
      max-width: 700px;
    }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .grid.three { grid-template-columns: 1fr 1fr 1fr; }

    label { display: flex; flex-direction: column; gap: .3rem; font-size: .85rem; color: var(--muted); }
    label span { color: var(--text); font-weight: 500; }

    input[type="number"],
    input[type="text"],
    select {
      background: #2a2a2a;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: .45rem .65rem;
      font-size: .9rem;
      width: 100%;
    }
    input[type="number"]:focus,
    input[type="text"]:focus,
    select:focus { outline: 2px solid var(--accent); border-color: transparent; }

    input[type="color"] {
      width: 100%;
      height: 38px;
      padding: 2px 4px;
      background: #2a2a2a;
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
    }

    .separator { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

    /* --- Text entries --- */
    #entries { display: flex; flex-direction: column; gap: .5rem; }

    .entry {
      display: flex;
      gap: .5rem;
      align-items: center;
    }
    .entry input {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: .45rem .65rem;
      font-size: .95rem;
    }
    .entry input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .entry .num {
      min-width: 1.4rem;
      text-align: right;
      color: var(--muted);
      font-size: .8rem;
    }

    /* --- Buttons --- */
    .btn-row { display: flex; gap: .75rem; flex-wrap: wrap; margin-top: .75rem; }

    button {
      padding: .5rem 1.1rem;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover:not(:disabled) { opacity: .85; }
    button:disabled { opacity: .4; cursor: default; }

    .btn-primary   { background: var(--accent);  color: #000; }
    .btn-secondary { background: #2e2e2e; color: var(--text); border: 1px solid var(--border); }
    .btn-success   { background: var(--success); color: #000; }
    .btn-danger    { background: var(--danger);  color: #fff; }
    .btn-sm        { padding: .3rem .65rem; font-size: .8rem; }

    /* --- Status / preview box --- */
    #status-box {
      display: none;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      font-size: .95rem;
      line-height: 1.6;
    }
    #status-box.info    { background: #1a2a3a; border: 1px solid #2a4a7a; color: #a8c8f8; }
    #status-box.success { background: #1a2e22; border: 1px solid #2a5a3a; color: #8fcfa8; }
    #status-box.error   { background: #2e1a1a; border: 1px solid #5a2a2a; color: #f08080; }

    #dl-btn { display: none; }

    .save-indicator {
      font-size: .75rem;
      color: var(--success);
      opacity: 0;
      transition: opacity .3s;
      margin-left: .5rem;
    }
    .save-indicator.show { opacity: 1; }
  </style>
</head>
<body>

<h1>🏷️ 3D-Schild-Generator</h1>

<!-- ═══ SETTINGS CARD ═══ -->
<div class="card">
  <h2>Schildformat <span class="save-indicator" id="save-ok">✓ Gespeichert</span></h2>

  <div class="grid three">
    <label><span>Breite (mm)</span>
      <input type="number" id="s-width"  min="10" step="0.5" value="{{ settings.width }}">
    </label>
    <label><span>Höhe (mm)</span>
      <input type="number" id="s-height" min="5"  step="0.5" value="{{ settings.height }}">
    </label>
    <label><span>Min. Rand (mm)</span>
      <input type="number" id="s-margin" min="0"  step="0.5" value="{{ settings.min_margin }}">
    </label>
  </div>

  <div class="grid" style="margin-top:.75rem">
    <label><span>Platten-Dicke (mm)</span>
      <input type="number" id="s-base-h" min="0.4" step="0.2" value="{{ settings.base_thickness }}">
    </label>
    <label><span>Text-Dicke (mm)</span>
      <input type="number" id="s-text-h" min="0.2" step="0.2" value="{{ settings.text_thickness }}">
    </label>
    <label><span>Text-Überstand (mm)</span>
      <input type="number" id="s-protrusion" step="0.1" value="{{ settings.text_protrusion }}">
    </label>
  </div>

  <hr class="separator">

  <div class="grid" style="margin-top:.25rem">
    <label><span>Hintergrundfarbe</span>
      <input type="color" id="s-bg-color"   value="{{ settings.bg_color }}">
    </label>
    <label><span>Schriftfarbe</span>
      <input type="color" id="s-text-color" value="{{ settings.text_color }}">
    </label>
  </div>

  <div style="margin-top:.75rem">
    <label><span>Schriftart</span>
      <select id="s-font">
        <option value="">— Schriftart wählen —</option>
        {% for f in fonts %}
        <option value="{{ f.path }}"
          {% if f.path == settings.font_path %}selected{% endif %}>
          {{ f.name }}
        </option>
        {% endfor %}
      </select>
    </label>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="saveSettings()">Einstellungen speichern</button>
  </div>
</div>

<!-- ═══ TEXTS CARD ═══ -->
<div class="card">
  <h2>Schilder-Texte</h2>

  <div id="entries"></div>

  <div class="btn-row">
    <button class="btn-secondary" onclick="addEntry()">＋ Schild hinzufügen</button>
    <button class="btn-secondary" onclick="removeLastEntry()">－ Letztes entfernen</button>
  </div>
</div>

<!-- ═══ ACTION CARD ═══ -->
<div class="card">
  <h2>Generieren</h2>

  <div id="status-box"></div>

  <div class="btn-row" style="margin-top:.5rem">
    <button class="btn-secondary" id="preview-btn" onclick="doPreview()">🔍 Vorschau berechnen</button>
    <button class="btn-primary"   id="gen-btn"     onclick="doGenerate()" disabled>⚙️ Generieren</button>
    <button class="btn-success"   id="dl-btn"      onclick="doDownload()">⬇️ signs.3mf herunterladen</button>
  </div>
</div>

<script>
  // ── state ──────────────────────────────────────────────────────────────────
  let previewDone = false;

  // ── entry management ───────────────────────────────────────────────────────
  function addEntry(value = "") {
    const container = document.getElementById("entries");
    const idx = container.children.length + 1;
    const div = document.createElement("div");
    div.className = "entry";
    div.innerHTML = `
      <span class="num">${idx}</span>
      <input type="text" placeholder="Schild-Text …" value="${escHtml(value)}"
             oninput="onTextChange()">
    `;
    container.appendChild(div);
    onTextChange();
  }

  function removeLastEntry() {
    const container = document.getElementById("entries");
    if (container.children.length > 1)
      container.removeChild(container.lastChild);
    renumberEntries();
    onTextChange();
  }

  function renumberEntries() {
    document.querySelectorAll(".entry .num").forEach((el, i) => {
      el.textContent = i + 1;
    });
  }

  function getTexts() {
    return [...document.querySelectorAll(".entry input")]
      .map(i => i.value.trim());
  }

  function onTextChange() {
    previewDone = false;
    document.getElementById("gen-btn").disabled = true;
    document.getElementById("dl-btn").style.display = "none";
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
  }

  // ── settings ───────────────────────────────────────────────────────────────
  function getCurrentSettings() {
    return {
      width:           parseFloat(document.getElementById("s-width").value)   || 120,
      height:          parseFloat(document.getElementById("s-height").value)  || 40,
      min_margin:      parseFloat(document.getElementById("s-margin").value)  || 3,
      base_thickness:  parseFloat(document.getElementById("s-base-h").value)  || 2,
      text_thickness:  parseFloat(document.getElementById("s-text-h").value)  || 1.5,
      bg_color:        document.getElementById("s-bg-color").value,
      text_color:      document.getElementById("s-text-color").value,
      text_protrusion: parseFloat(document.getElementById("s-protrusion").value) || 0,
      font_path:       document.getElementById("s-font").value,
    };
  }

  async function saveSettings() {
    const res  = await fetch("/api/settings", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(getCurrentSettings()),
    });
    if (res.ok) {
      const ind = document.getElementById("save-ok");
      ind.classList.add("show");
      setTimeout(() => ind.classList.remove("show"), 2000);
    }
  }

  // ── status box ─────────────────────────────────────────────────────────────
  function showStatus(msg, type = "info") {
    const box = document.getElementById("status-box");
    box.className = type;
    box.style.display = "block";
    box.innerHTML = msg;
  }

  function hideStatus() {
    const box = document.getElementById("status-box");
    box.style.display = "none";
  }

  // ── preview ────────────────────────────────────────────────────────────────
  async function doPreview() {
    const texts = getTexts().filter(t => t.length > 0);
    if (texts.length === 0) { showStatus("Bitte mindestens einen Text eingeben.", "error"); return; }

    const btn = document.getElementById("preview-btn");
    btn.disabled = true;
    btn.textContent = "⏳ Berechne…";
    showStatus("Berechne optimale Schriftgröße …", "info");

    try {
      const res  = await fetch("/api/preview", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ texts, settings: getCurrentSettings() }),
      });
      const data = await res.json();

      if (!res.ok) { showStatus("❌ " + data.error, "error"); return; }

      showStatus(
        `<strong>Vorschau-Ergebnis</strong><br>
         📐 Schriftgröße: <strong>${data.font_size} pt</strong><br>
         🏷️ Schilder: <strong>${data.sign_count}</strong><br>
         📦 Verfügbare Fläche: <strong>${data.available_w} × ${data.available_h} mm</strong><br><br>
         Wenn das passt → <em>„Generieren"</em> klicken.`,
        "info"
      );
      previewDone = true;
      document.getElementById("gen-btn").disabled = false;
    } finally {
      btn.disabled = false;
      btn.textContent = "🔍 Vorschau berechnen";
    }
  }

  // ── generate ───────────────────────────────────────────────────────────────
  async function doGenerate() {
    const texts = getTexts().filter(t => t.length > 0);
    if (texts.length === 0) { showStatus("Bitte mindestens einen Text eingeben.", "error"); return; }

    const btn = document.getElementById("gen-btn");
    btn.disabled = true;
    btn.textContent = "⏳ Generiere…";
    showStatus("Generiere 3D-Schilder … (kann einige Sekunden dauern)", "info");

    try {
      const res  = await fetch("/api/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ texts, settings: getCurrentSettings() }),
      });
      const data = await res.json();

      if (!res.ok) { showStatus("❌ " + data.error, "error"); return; }

      showStatus(
        `✅ <strong>${data.sign_count} Schilder</strong> erfolgreich generiert!<br>
         Schriftgröße: <strong>${data.font_size} pt</strong>`,
        "success"
      );
      document.getElementById("dl-btn").style.display = "inline-block";
    } finally {
      btn.disabled = false;
      btn.textContent = "⚙️ Generieren";
    }
  }

  // ── download ───────────────────────────────────────────────────────────────
  function doDownload() {
    window.location.href = "/api/download";
  }

  // ── init ───────────────────────────────────────────────────────────────────
  // Pre-fill 3 empty entries on load
  addEntry(); addEntry(); addEntry();
</script>

</body>
</html>
