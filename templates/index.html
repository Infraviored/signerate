<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Signerate — Premium Sign Generator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style id="dynamic-fonts"></style>
</head>
<body>

<h1>🏷️ 3D Signerate</h1>

<div class="container">
  
  <!-- ═══ LEFT COLUMN: CONFIG ═══ -->
  <div class="config-column" style="display: flex; flex-direction: column; gap: 2rem;">
    
    <!-- Settings -->
    <div class="card">
      <h2>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Dimensions
      </h2>
      
      <div class="grid">
        <div class="field-group">
          <label>Width (mm)</label>
          <input type="number" id="s-width" min="10" step="0.5" value="{{ settings.width }}" onchange="updateAllPreviews()">
        </div>
        <div class="field-group">
          <label>Height (mm)</label>
          <input type="number" id="s-height" min="5" step="0.5" value="{{ settings.height }}" onchange="updateAllPreviews()">
        </div>
      </div>

      <div class="grid">
        <div class="field-group">
          <label>Base Thickness (mm)</label>
          <input type="number" id="s-base-h" min="0.4" step="0.2" value="{{ settings.base_thickness }}">
        </div>
        <div class="field-group">
          <label>Text Thickness (mm)</label>
          <input type="number" id="s-text-h" min="0.2" step="0.2" value="{{ settings.text_thickness }}">
        </div>
      </div>

      <div class="grid">
        <div class="field-group">
          <label>Min. Margin (mm)</label>
          <input type="number" id="s-margin" min="0" step="0.5" value="{{ settings.min_margin }}" onchange="updateAllPreviews()">
        </div>
        <div class="field-group">
          <label>Protrusion (mm)</label>
          <input type="number" id="s-protrusion" step="0.1" value="{{ settings.text_protrusion }}">
        </div>
      </div>

      <h2>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-3M9.707 3.293l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L9.414 7H17a2 2 0 012 2v1"/></svg>
        Style
      </h2>

      <div class="grid">
        <div class="field-group">
          <label>Background Color</label>
          <input type="color" id="s-bg-color" value="{{ settings.bg_color }}" oninput="updateAllPreviews()">
        </div>
        <div class="field-group">
          <label>Text Color</label>
          <input type="color" id="s-text-color" value="{{ settings.text_color }}" oninput="updateAllPreviews()">
        </div>
      </div>

      <div class="field-group">
        <label>Font Family</label>
        <select id="s-font" onchange="onFontChange()">
          <option value="">— Select Font —</option>
          {% for f in fonts %}
          <option value="{{ f.path }}" 
                  data-name="{{ f.name }}"
                  style="font-family: 'FontPreview_{{ loop.index }}';"
                  {% if f.path == settings.font_path %}selected{% endif %}>
            {{ f.name }}
          </option>
          {% endfor %}
        </select>
      </div>

      <button class="btn btn-secondary" style="width: 100%;" onclick="saveSettings()">
        <span>Save Configuration</span>
      </button>
    </div>

    <!-- Texts -->
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2 style="margin: 0;">Sign Texts</h2>
        <div style="display: flex; gap: 0.5rem;">
          <button class="btn btn-secondary btn-icon" onclick="removeLastEntry()" title="Remove">－</button>
          <button class="btn btn-secondary btn-icon" onclick="addEntry()" title="Add">＋</button>
        </div>
      </div>
      
      <div id="entries" class="entry-list"></div>
    </div>
  </div>

  <!-- ═══ RIGHT COLUMN: EXPORT ═══ -->
  <div class="preview-column">
    <div class="preview-container">
      
      <div class="card">
        <h2>Export & Mass Preview</h2>
        <div class="preview-view" id="preview-box" style="margin-bottom: 1.5rem; min-height: 200px;">
          <div class="empty-state">Live preview of all signs will appear here.</div>
        </div>

        <div class="grid" style="grid-template-columns: 1fr auto; align-items: end; gap: 1rem;">
          <div class="field-group" style="margin: 0;">
            <label>Export Format</label>
            <select id="s-format">
              <option value="3mf">3MF (Bambu/Prusa Multi-Color)</option>
              <option value="step">STEP (Universal CAD / Colors)</option>
            </select>
          </div>
          
          <button id="gen-btn" class="btn btn-success" onclick="doGenerate()">
            <div class="loader"></div>
            <span>🚀 Generate & Download All</span>
          </button>
        </div>

        <div id="dl-link-container" style="margin-top: 1rem; display: none; text-align: center;">
             <a id="dl-link" class="btn btn-primary"><span>⬇️ Re-download Package</span></a>
        </div>
        
        <div id="status-toast" class="status-toast" style="margin-top: 1rem;"></div>
      </div>

      <div class="card">
          <h2>Stats</h2>
          <div id="stats-info" style="font-size: 0.85rem; color: var(--text-muted);">
              Calculated Font Size: <span id="stat-font-size">—</span><br>
              Total Signs: <span id="stat-count">—</span>
          </div>
      </div>

    </div>
  </div>

</div>

<script>
  let previewTimeout = null;

  // --- Dynamic Font Loading ---
  function initFonts() {
    const styleEl = document.getElementById('dynamic-fonts');
    const select = document.getElementById('s-font');
    let css = "";
    
    [...select.options].forEach((opt, idx) => {
      if (!opt.value) return;
      const fontUrl = `/api/font?path=${encodeURIComponent(opt.value)}`;
      css += `
        @font-face {
          font-family: 'FontPreview_${idx}';
          src: url('${fontUrl}');
        }
      `;
    });
    styleEl.innerHTML = css;
  }

  function addEntry(value = "") {
    const container = document.getElementById("entries");
    const idx = container.children.length + 1;
    const div = document.createElement("div");
    div.className = "entry-item";
    div.style.flexDirection = "column";
    div.style.alignItems = "stretch";
    
    div.innerHTML = `
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <span class="entry-num">${idx}</span>
        <input type="text" placeholder="Enter sign text..." value="${escHtml(value)}" oninput="onEntryInput()">
      </div>
      <div class="sign-mini-preview" style="height: 60px; margin-top: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--glass-border);">
        <span style="font-size: 0.7rem; color: var(--text-muted); opacity: 0.5;">Preview...</span>
      </div>
    `;
    container.appendChild(div);
    updateAllPreviews();
  }

  function removeLastEntry() {
    const container = document.getElementById("entries");
    if (container.children.length > 1) {
      container.removeChild(container.lastChild);
      updateAllPreviews();
    }
  }

  function onEntryInput() {
    // Debounce preview for performance
    clearTimeout(previewTimeout);
    previewTimeout = setTimeout(() => {
        updateAllPreviews();
    }, 400);
  }

  function onFontChange() {
      const select = document.getElementById('s-font');
      const selected = select.options[select.selectedIndex];
      if (selected) {
          select.style.fontFamily = selected.style.fontFamily;
      }
      updateAllPreviews();
  }

  function getTexts() {
    return [...document.querySelectorAll(".entry-item input")].map(i => i.value.trim());
  }

  async function updateAllPreviews() {
    const texts = getTexts().filter(t => t.length > 0);
    if (texts.length === 0) {
        document.getElementById("preview-box").innerHTML = `<div class="empty-state">Live preview of all signs will appear here.</div>`;
        document.getElementById("stat-font-size").textContent = "—";
        document.getElementById("stat-count").textContent = "—";
        document.querySelectorAll(".sign-mini-preview").forEach(mini => {
            mini.innerHTML = `<span style="font-size: 0.7rem; color: var(--text-muted); opacity: 0.5;">Preview...</span>`;
        });
        return;
    }

    try {
      const res = await fetch("/api/preview", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ texts, settings: getCurrentSettings() }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      // Update Large Preview
      document.getElementById("preview-box").innerHTML = data.svg;
      
      // Update Stats
      document.getElementById("stat-font-size").textContent = data.font_size + " pt";
      document.getElementById("stat-count").textContent = texts.length;

      // Update Individual Mini-Previews
      const entries = document.querySelectorAll(".entry-item");
      const settings = getCurrentSettings();
      texts.forEach((txt, idx) => {
          if (entries[idx]) {
              const mini = entries[idx].querySelector(".sign-mini-preview");
              mini.innerHTML = `
                <svg width="100%" height="100%" viewBox="0 0 ${settings.width} ${settings.height}" xmlns="http://www.w3.org/2000/svg">
                  <rect x="0" y="0" width="${settings.width}" height="${settings.height}" fill="${settings.bg_color}" />
                  <text x="${settings.width/2}" y="${settings.height/2}" fill="${settings.text_color}" 
                        font-family="sans-serif" font-size="${data.font_size * 0.8}px" 
                        text-anchor="middle" dominant-baseline="central">${escHtml(txt)}</text>
                </svg>
              `;
          }
      });
    } catch (e) {
      console.error(e);
    }
  }

  function getCurrentSettings() {
    return {
      width: parseFloat(document.getElementById("s-width").value) || 120,
      height: parseFloat(document.getElementById("s-height").value) || 40,
      min_margin: parseFloat(document.getElementById("s-margin").value) || 3,
      base_thickness: parseFloat(document.getElementById("s-base-h").value) || 2,
      text_thickness: parseFloat(document.getElementById("s-text-h").value) || 1.5,
      text_protrusion: parseFloat(document.getElementById("s-protrusion").value) || 1.5,
      bg_color: document.getElementById("s-bg-color").value,
      text_color: document.getElementById("s-text-color").value,
      font_path: document.getElementById("s-font").value,
    };
  }

  async function saveSettings() {
    await fetch("/api/settings", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(getCurrentSettings()),
    });
    showToast("Configuration saved.", "success");
  }

  function showToast(msg, type = "info") {
    const t = document.getElementById("status-toast");
    t.className = `status-toast ${type}`;
    t.style.display = "block";
    t.innerHTML = msg;
    setTimeout(() => { t.style.display = "none"; }, 5000);
  }

  async function doGenerate() {
    const texts = getTexts().filter(t => t.length > 0);
    if (texts.length === 0) return showToast("Please enter some text for the signs.", "error");

    const format = document.getElementById("s-format").value;

    const btn = document.getElementById("gen-btn");
    btn.classList.add("loading");
    btn.disabled = true;

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ texts, format, settings: getCurrentSettings() }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      showToast("Generation successful! Downloading...", "success");
      window.location.href = "/api/download";
      
      const dlCont = document.getElementById("dl-link-container");
      const dlLink = document.getElementById("dl-link");
      dlLink.href = "/api/download";
      dlLink.querySelector("span").textContent = `⬇️ Re-download ${data.filename}`;
      dlCont.style.display = "block";
      
    } catch (e) {
      showToast("Error: " + e.message, "error");
    } finally {
      btn.classList.remove("loading");
      btn.disabled = false;
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
  }

  // Init
  initFonts();
  addEntry("SIGN ONE"); addEntry("SIGN TWO");
  onFontChange();
</script>

</body>
</html>
