<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Signerate — Premium Sign Generator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style id="dynamic-fonts"></style>
</head>
<body>

<h1>🏷️ 3D Signerate</h1>

<div class="container">
  
  <!-- ═══ LEFT COLUMN: CONFIG ═══ -->
  <div class="config-column" style="display: flex; flex-direction: column; gap: 2rem;">
    
    <!-- Settings -->
    <div class="card">
      <h2>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Dimensions
      </h2>
      
      <div class="grid">
        <div class="field-group">
          <div class="label-wrapper">
            <label>Width (mm)</label>
            <span class="help-icon" data-tooltip="The full horizontal width of each sign plate.">?</span>
          </div>
          <input type="number" id="s-width" min="10" step="0.5" value="{{ settings.width }}" onchange="updateAllPreviews()">
        </div>
        <div class="field-group">
          <div class="label-wrapper">
            <label>Height (mm)</label>
            <span class="help-icon" data-tooltip="The vertical height of each sign plate.">?</span>
          </div>
          <input type="number" id="s-height" min="5" step="0.5" value="{{ settings.height }}" onchange="updateAllPreviews()">
        </div>
      </div>

      <div class="grid">
        <div class="field-group">
          <div class="label-wrapper">
            <label>Total Thickness (mm)</label>
            <span class="help-icon" data-tooltip="The thickness of the background plate.">?</span>
          </div>
          <input type="number" id="s-base_thickness" min="0.4" step="0.2" value="{{ settings.base_thickness }}" onchange="updateAllPreviews()">
        </div>
        <div class="field-group">
          <div class="label-wrapper">
            <label>Text Thickness (mm)</label>
            <span class="help-icon" data-tooltip="The depth of the text extrusion. Should usually be less than (Total Thickness + Protrusion).">?</span>
          </div>
          <input type="number" id="s-text_thickness" min="0.2" step="0.2" value="{{ settings.text_thickness }}" onchange="updateAllPreviews()">
        </div>
      </div>

      <div class="grid">
        <div class="field-group">
          <div class="label-wrapper">
            <label>Min. Margin (mm)</label>
            <span class="help-icon" data-tooltip="Minimum empty space ensured between the text and the sign edges.">?</span>
          </div>
          <input type="number" id="s-min_margin" min="0" step="0.5" value="{{ settings.min_margin }}" onchange="updateAllPreviews()">
        </div>
        <div class="field-group">
          <div class="label-wrapper">
            <label>Protrusion (mm)</label>
            <span class="help-icon" data-tooltip="Distance the text sticks out from the front surface. 0 = Flush with top.">?</span>
          </div>
          <input type="number" id="s-text_protrusion" step="0.1" value="{{ settings.text_protrusion }}" onchange="updateAllPreviews()">
        </div>
      </div>

      <h2>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-3M9.707 3.293l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L9.414 7H17a2 2 0 012 2v1"/></svg>
        Style
      </h2>

      <div class="grid">
        <div class="field-group">
          <label>Background Color</label>
          <input type="color" id="s-bg-color" value="{{ settings.bg_color }}" oninput="updateAllPreviews()">
        </div>
        <div class="field-group">
          <label>Text Color</label>
          <input type="color" id="s-text-color" value="{{ settings.text_color }}" oninput="updateAllPreviews()">
        </div>
      </div>

      <div class="field-group">
        <label>Font Family</label>
        <div class="custom-dropdown" id="font-dropdown">
          <div class="dropdown-trigger" id="dropdown-trigger" onclick="toggleDropdown()">
            <span id="trigger-label">— Select Font —</span>
          </div>
          <div class="dropdown-content" id="dropdown-content">
            <div class="dropdown-search">
              <input type="text" id="font-search" placeholder="Search fonts..." oninput="filterFonts(this.value)">
            </div>
            <div class="dropdown-list" id="font-list">
              {% for f in fonts %}
              <div class="dropdown-option" 
                   data-path="{{ f.path }}" 
                   data-name="{{ f.name }}"
                   data-family="FontPreview_{{ loop.index }}"
                   style="font-family: 'FontPreview_{{ loop.index }}';"
                   onclick="selectFont('{{ f.path }}', '{{ f.name }}', 'FontPreview_{{ loop.index }}')">
                {{ f.name }}
              </div>
              {% endfor %}
            </div>
          </div>
          <input type="hidden" id="s-font" value="{{ settings.font_path }}">
        </div>

        <div class="field-group" style="margin-top: 2rem;">
          <label>Horizontal Align</label>
          <select id="s-horizontal_align" onchange="updateAllPreviews()">
            <option value="left" {% if settings.horizontal_align == 'left' %}selected{% endif %}>Left</option>
            <option value="center" {% if settings.horizontal_align == 'center' %}selected{% endif %}>Center</option>
            <option value="right" {% if settings.horizontal_align == 'right' %}selected{% endif %}>Right</option>
          </select>
        </div>
      </div>

      <div class="card" style="padding: 1.5rem;">
          <h2 style="margin-bottom: 1rem;">Stats</h2>
          <div id="stats-info" style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.8;">
              Font Size: <span id="stat-font-size" style="color: var(--text); font-weight: 700;">—</span><br>
              Signs: <span id="stat-count" style="color: var(--text);">—</span><br>
              <div id="stat-limit-box" style="margin-top: 0.5rem; display: none;">
                  Limited by: <span id="stat-limit" style="color: #ff9800; font-weight: 700;">—</span>
              </div>
          </div>
      </div>
    </div>
  </div>

  <!-- ═══ RIGHT COLUMN: CONTENT & EXPORT ═══ -->
  <div class="preview-column">
    <div class="preview-container" style="gap: 2rem;">
      
      <!-- Texts (White Card) -->
      <div class="white-card">
        <h2>
          <div class="set-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1.2rem;height:1.2rem;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            <span>Signs</span>
            <span class="set-count" id="set-count-badge">(0)</span>
            <span>:</span>
            <input type="text" id="set-name-input" class="set-name-input" value="Workshop" oninput="markDirty()">
          </div>
          <div class="set-actions">
            <button class="icon-btn" id="btn-save" onclick="saveSet()" title="Save Set">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            </button>
            <button class="icon-btn" onclick="listSets()" title="Load Set">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            </button>
          </div>
        </h2>
        
        <div id="entries" class="entry-list"></div>
      </div>

      <!-- Export Card -->
      <div class="card">
        <h2>Export Package</h2>
        <div class="grid" style="grid-template-columns: 1fr auto; align-items: end; gap: 1.5rem;">
          <div class="field-group" style="margin: 0;">
            <div class="label-wrapper">
              <label>Export Format</label>
              <span class="help-icon" data-tooltip="3MF is best for Bambu/Prusa slicers. STEP is best for CAD editing.">?</span>
            </div>
            <select id="s-format" onchange="markDirty()">
              <option value="3mf">3MF (Bambu/Prusa Multi-Color)</option>
              <option value="step">STEP (Universal CAD / Colors)</option>
            </select>
          </div>
          
          <button id="gen-btn" class="btn btn-success" onclick="doGenerate()">
            <div class="loader"></div>
            <span id="gen-btn-text">🚀 Generate & Download All</span>
          </button>
        </div>
        
        <div id="status-toast" class="status-toast" style="margin-top: 1rem;"></div>
        
        <div id="gen-progress-container" class="progress-container">
          <div id="gen-progress-bar" class="progress-bar"></div>
        </div>
        <div id="gen-progress-text" class="progress-text">Generating...</div>
      </div>

    </div>
  </div>

</div>

<script>
  let currentFontFamily = "sans-serif";
  let previewTimeout = null;
  let lastGeneratedState = null;

  // --- Premium Font Dropdown Logic ---
  function initFonts() {
    const styleEl = document.getElementById('dynamic-fonts');
    const options = document.querySelectorAll('.dropdown-option');
    let css = "";
    
    options.forEach((opt, idx) => {
      const path = opt.getAttribute('data-path');
      const fontUrl = `/api/font?path=${encodeURIComponent(path)}`;
      css += `
        @font-face {
          font-family: 'FontPreview_${idx + 1}';
          src: url('${fontUrl}');
        }
      `;
      
      // Set initial trigger state
      if (path === document.getElementById('s-font').value) {
         const family = `FontPreview_${idx + 1}`;
         currentFontFamily = family;
         setTrigger(opt.getAttribute('data-name'), family);
         opt.classList.add('selected');
      }
    });
    styleEl.innerHTML = css;
    updateInputFonts();
  }

  function toggleDropdown() {
    const content = document.getElementById('dropdown-content');
    const trigger = document.getElementById('dropdown-trigger');
    const isOpen = content.classList.contains('show');
    
    // Close all first
    document.querySelectorAll('.dropdown-content').forEach(c => c.classList.remove('show'));
    document.querySelectorAll('.dropdown-trigger').forEach(t => t.classList.remove('active'));

    if (!isOpen) {
      content.classList.add('show');
      trigger.classList.add('active');
      document.getElementById('font-search').focus();
    }
  }

  function setTrigger(name, family) {
    const label = document.getElementById('trigger-label');
    label.textContent = name;
    label.style.fontFamily = family;
  }

  function updateInputFonts() {
    document.querySelectorAll('.entry-item input').forEach(input => {
      input.style.fontFamily = currentFontFamily;
    });
  }

  function selectFont(path, name, family) {
    document.getElementById('s-font').value = path;
    currentFontFamily = family;
    setTrigger(name, family);
    updateInputFonts();
    
    document.querySelectorAll('.dropdown-option').forEach(opt => {
      opt.classList.remove('selected');
      if (opt.getAttribute('data-path') === path) opt.classList.add('selected');
    });

    document.getElementById('dropdown-content').classList.remove('show');
    document.getElementById('dropdown-trigger').classList.remove('active');
    
    onFontChange();
  }

  function filterFonts(query) {
    const q = query.toLowerCase();
    document.querySelectorAll('.dropdown-option').forEach(opt => {
      const name = opt.getAttribute('data-name').toLowerCase();
      opt.style.display = name.includes(q) ? 'block' : 'none';
    });
  }

  // Global click to close
  window.addEventListener('click', (e) => {
    if (!e.target.closest('#font-dropdown')) {
      document.getElementById('dropdown-content').classList.remove('show');
      document.getElementById('dropdown-trigger').classList.remove('active');
    }
  });

  function addEntry(value = "") {
    const container = document.getElementById("entries");
    const div = document.createElement("div");
    div.className = "entry-item";
    div.innerHTML = `
      <input type="text" placeholder="Type here..." value="${escHtml(value)}" oninput="onEntryInput(this)">
      <div class="btn-delete" onclick="removeEntry(this)" title="Delete sign">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
      </div>
      <div class="sign-mini-preview">
        <span style="font-size: 0.6rem; color: var(--text-muted); opacity: 0.5;">Preview</span>
      </div>
    `;
    container.appendChild(div);
    updateAllPreviews();
    markDirty();
  }

  function removeEntry(btn) {
    const entry = btn.parentElement;
    entry.style.opacity = '0';
    entry.style.transform = 'translateX(20px)';
    setTimeout(() => {
        entry.remove();
        const container = document.getElementById("entries");
        if (container.children.length === 0) {
            addEntry("");
        }
        updateAllPreviews();
        markDirty();
    }, 200);
  }

  function onEntryInput(inputEl) {
    const container = document.getElementById("entries");
    const isLastRow = inputEl.parentElement === container.lastChild;
    
    // Auto-append row if typing in the last one
    if (isLastRow && inputEl.value.trim() !== "") {
        addEntry();
    }

    markDirty();
    clearTimeout(previewTimeout);
    previewTimeout = setTimeout(() => {
        updateAllPreviews();
        saveSettings();
    }, 400);
  }

  function onFontChange() {
      markDirty();
      updateAllPreviews();
      saveSettings();
  }

  function getTexts() {
    return [...document.querySelectorAll(".entry-item input")].map(i => i.value.trim());
  }

  async function updateAllPreviews() {
    const texts = getTexts().filter(t => t.length > 0);
    if (texts.length === 0) {
        document.getElementById("stat-font-size").textContent = "—";
        document.getElementById("stat-count").textContent = "—";
        document.querySelectorAll(".sign-mini-preview").forEach(mini => {
            mini.innerHTML = `<span style="font-size: 0.6rem; color: #aaa;">Preview</span>`;
        });
        return;
    }

    try {
      const res = await fetch("/api/preview", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ texts, settings: getCurrentSettings() }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      // We removed the large preview box, but we could keep it hidden or use it for something else.
      // For now, it's removed from HTML but let's just make sure we don't crash.
      // document.getElementById("preview-box").innerHTML = data.svg;
      
      // Update Stats & Highlighting
      document.getElementById("stat-font-size").textContent = data.font_size.toFixed(2) + " mm";
      document.getElementById("stat-count").textContent = texts.length;
      
      const limitBox = document.getElementById("stat-limit-box");
      const limitText = document.getElementById("stat-limit");
      if (data.limiting_text) {
          limitBox.style.display = "block";
          limitText.textContent = `"${data.limiting_text}"`;
      } else {
          limitBox.style.display = "none";
      }

      // --- Thickness Validation ---
      const settings = getCurrentSettings();
      const maxZ = settings.base_thickness + settings.text_protrusion;
      const minZ = maxZ - settings.text_thickness;
      
      let warn = document.getElementById("stat-thickness-warn");
      if (!warn) {
          warn = document.createElement("div");
          warn.id = "stat-thickness-warn";
          warn.style.marginTop = "0.75rem";
          warn.style.padding = "0.5rem";
          warn.style.borderRadius = "6px";
          warn.style.fontSize = "0.75rem";
          warn.style.background = "rgba(0,0,0,0.2)";
          document.getElementById("stats-info").appendChild(warn);
      }
      
      if (minZ < -0.01) {
          warn.innerHTML = `<span style="color:#ff4444; font-weight:700;">⚠️ POKES THROUGH BACK</span><br>Text is ${Math.abs(minZ).toFixed(2)}mm too deep!`;
          warn.style.display = "block";
          warn.style.border = "1px solid rgba(255,68,68,0.3)";
      } else if (minZ < 0.4) {
          warn.innerHTML = `<span style="color:#ff9800; font-weight:700;">⚠️ FRAGILE BACK</span><br>Remaining back wall: ${minZ.toFixed(2)}mm`;
          warn.style.display = "block";
          warn.style.border = "1px solid rgba(255,152,0,0.3)";
      } else {
          warn.style.display = "none";
      }

      // Update Individual Mini-Previews and Highlight Bottleneck
      const entries = document.querySelectorAll(".entry-item");

      entries.forEach(entry => entry.classList.remove("bottleneck"));

      texts.forEach((txt, idx) => {
          if (entries[idx]) {
              const mini = entries[idx].querySelector(".sign-mini-preview");
              
              // Highlight if this is the limiting sign
              if (txt === data.limiting_text) {
                  entries[idx].classList.add("bottleneck");
              }

              const align = settings.horizontal_align || "center";
              let xPos = settings.width / 2;
              let anchor = "middle";
              
              if (align === "left") {
                  xPos = settings.min_margin;
                  anchor = "start";
              } else if (align === "right") {
                  xPos = settings.width - settings.min_margin;
                  anchor = "end";
              }

              mini.innerHTML = `
                <svg width="100%" height="100%" viewBox="0 0 ${settings.width} ${settings.height}" 
                     preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                  <rect x="0" y="0" width="${settings.width}" height="${settings.height}" fill="${settings.bg_color}" rx="1" ry="1" />
                  <text x="${xPos}" y="${settings.height/2}" fill="${settings.text_color}" 
                        font-family="${currentFontFamily}" font-size="${data.font_size * 0.8}px" 
                        text-anchor="${anchor}" dominant-baseline="central">${escHtml(txt)}</text>
                </svg>
              `;
          }
      });
    } catch (e) {
      console.error("Preview Error:", e);
    }
  }

  function getCurrentSettings() {
    const val = (id, def) => {
        const v = parseFloat(document.getElementById(id).value);
        return isNaN(v) ? def : v;
    };
    
    return {
      width: val("s-width", 120),
      height: val("s-height", 40),
      min_margin: val("s-min_margin", 3),
      base_thickness: val("s-base_thickness", 2),
      text_thickness: val("s-text_thickness", 1.5),
      text_protrusion: val("s-text_protrusion", 0),
      bg_color: document.getElementById("s-bg-color").value,
      text_color: document.getElementById("s-text-color").value,
      font_path: document.getElementById("s-font").value,
      horizontal_align: document.getElementById("s-horizontal_align").value,
    };
  }

  async function saveSettings() {
    markDirty();
    try {
        await fetch("/api/settings", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(getCurrentSettings()),
        });
    } catch(e) { console.error("Auto-save failed", e); }
  }

  function showToast(msg, type = "info") {
    const t = document.getElementById("status-toast");
    t.className = `status-toast ${type}`;
    t.style.display = "block";
    t.innerHTML = msg;
    setTimeout(() => { t.style.display = "none"; }, 5000);
  }

  let lastSavedSetJson = "";

  function markDirty() {
     document.getElementById("gen-btn-text").textContent = "🚀 Generate & Download All";
     
     const currentSet = {
       name: document.getElementById("set-name-input").value,
       texts: getTexts(),
       settings: getCurrentSettings()
     };
     
     const currentJson = JSON.stringify(currentSet);
     const saveBtn = document.getElementById("btn-save");
     
     if (currentJson !== lastSavedSetJson) {
       saveBtn.classList.add("dirty");
     } else {
       saveBtn.classList.remove("dirty");
     }
     
     document.getElementById("set-count-badge").textContent = `(${currentSet.texts.filter(t => t.trim()).length})`;
  }

  async function saveSet() {
      const set = {
          name: document.getElementById("set-name-input").value.trim() || "Untitled Set",
          texts: getTexts().filter(t => t.trim()),
          settings: getCurrentSettings()
      };
      
      try {
          const res = await fetch("/api/sets", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify(set)
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          
          document.getElementById("set-name-input").value = data.name;
          lastSavedSetJson = JSON.stringify(set);
          markDirty();
          showToast(`Set "${data.name}" saved successfully!`, "success");
      } catch (e) {
          showToast("Failed to save set: " + e.message, "error");
      }
  }

  async function listSets() {
      try {
          const res = await fetch("/api/sets");
          const sets = await res.json();
          if (sets.length === 0) return showToast("No saved sets found.", "info");
          
          let listHtml = sets.map(s => `<div class="dropdown-option" onclick="loadSet('${s}')">${s}</div>`).join("");
          
          // Simple temporary modal / overlay
          const overlay = document.createElement("div");
          overlay.style = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);";
          overlay.onclick = () => overlay.remove();
          
          const content = document.createElement("div");
          content.className = "white-card";
          content.style = "width:300px;max-height:400px;overflow-y:auto;padding:1.5rem;";
          content.onclick = (e) => e.stopPropagation();
          content.innerHTML = `
            <h3 style="margin-bottom:1rem;color:var(--text);font-size:1rem;">Load Set</h3>
            <div class="dropdown-list" style="max-height:300px;display:block;">${listHtml}</div>
          `;
          overlay.appendChild(content);
          document.body.appendChild(overlay);
      } catch (e) {
          showToast("Failed to list sets", "error");
      }
  }

  async function loadSet(name) {
      try {
          const res = await fetch(`/api/sets/${name}`);
          const set = await res.json();
          if (!res.ok) throw new Error(set.error);
          
          // Update Name
          document.getElementById("set-name-input").value = set.name;
          
          // Update Settings
          for (const [key, val] of Object.entries(set.settings)) {
              const el = document.querySelector(`[id$='-${key}']`) || document.getElementById(`s-${key}`);
              if (el) {
                  el.value = val;
                  // Trigger events for color pickers or specific UI elements
                  if (el.onchange) el.onchange();
              }
          }
          
          // Re-init inputs
          const entries = document.getElementById("entries");
          entries.innerHTML = "";
          set.texts.forEach(t => addEntry(t));
          if (set.texts.length === 0) addEntry();
          
          // Specific UI updates
          await initFonts(); // Re-sync font dropdown
          
          lastSavedSetJson = JSON.stringify(set);
          markDirty();
          updateAllPreviews();
          
          // Close overlay
          const overlay = document.querySelector("[style*='z-index: 2000']");
          if (overlay) overlay.remove();
          
          showToast(`Loaded set: ${name}`, "success");
      } catch (e) {
          showToast("Failed to load set: " + e.message, "error");
          throw e; // Re-throw so IIFE catch block can handle fallback
      }
  }

  async function doGenerate() {
    const texts = getTexts().filter(t => t.length > 0);
    if (texts.length === 0) return showToast("Please enter some text for the signs.", "error");

    const settings = getCurrentSettings();
    const format = document.getElementById("s-format").value;
    const currentState = JSON.stringify({ texts, settings, format });

    // "Smart" Download: If state is same, just download.
    if (lastGeneratedState === currentState) {
        showToast("Re-downloading existing package...", "info");
        window.location.href = "/api/download";
        return;
    }

    const btn = document.getElementById("gen-btn");
    const progressContainer = document.getElementById("gen-progress-container");
    const progressBar = document.getElementById("gen-progress-bar");
    const progressText = document.getElementById("gen-progress-text");

    btn.classList.add("loading");
    btn.disabled = true;
    progressContainer.style.display = "block";
    progressText.style.display = "block";
    progressBar.style.width = "0%";
    progressText.textContent = `Starting generation...`;

    let progressInterval = setInterval(async () => {
        try {
            const res = await fetch("/api/progress");
            const data = await res.json();
            if (data.active && data.total > 0) {
                const pct = (data.current / data.total) * 100;
                progressBar.style.width = `${pct}%`;
                progressText.textContent = `Processing sign ${data.current} of ${data.total}...`;
            }
        } catch(e) {}
    }, 500);

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ texts, format, settings }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      progressBar.style.width = "100%";
      progressText.textContent = "Complete!";

      showToast("Generation successful! Downloading...", "success");
      lastGeneratedState = currentState;
      document.getElementById("gen-btn-text").textContent = "⬇️ Download Again";
      window.location.href = "/api/download";
      
    } catch (e) {
      showToast("Error: " + e.message, "error");
      progressText.textContent = "Failed.";
    } finally {
      clearInterval(progressInterval);
      btn.classList.remove("loading");
      btn.disabled = false;
      setTimeout(() => {
          progressContainer.style.display = "none";
          progressText.style.display = "none";
      }, 3000);
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
  }

  // Init
  (async function() {
      await initFonts();
      // Try to load the default set seeded by the backend
      try {
          await loadSet("Workshop");
      } catch(e) {
          // Fallback if load fails
          addEntry();
          onFontChange();
      }
  })();
</script>
