<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Signerate — Premium Sign Generator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style id="dynamic-fonts"></style>
</head>
<body>

<h1>🏷️ 3D Signerate</h1>

<div class="container">
  
  <!-- ═══ LEFT COLUMN: CONFIG ═══ -->
  <div class="config-column" style="display: flex; flex-direction: column; gap: 2rem;">
    
    <!-- Settings -->
    <div class="card">
      <h2>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Dimensions
      </h2>
      
      <div class="grid">
        <div class="field-group">
          <label>Width (mm)</label>
          <input type="number" id="s-width" min="10" step="0.5" value="{{ settings.width }}" onchange="updateAllPreviews()">
        </div>
        <div class="field-group">
          <label>Height (mm)</label>
          <input type="number" id="s-height" min="5" step="0.5" value="{{ settings.height }}" onchange="updateAllPreviews()">
        </div>
      </div>

      <div class="grid">
        <div class="field-group">
          <label>Base Thickness (mm)</label>
          <input type="number" id="s-base-h" min="0.4" step="0.2" value="{{ settings.base_thickness }}" onchange="updateAllPreviews()">
        </div>
        <div class="field-group">
          <label>Text Thickness (mm)</label>
          <input type="number" id="s-text-h" min="0.2" step="0.2" value="{{ settings.text_thickness }}" onchange="updateAllPreviews()">
        </div>
      </div>

      <div class="grid">
        <div class="field-group">
          <label>Min. Margin (mm)</label>
          <input type="number" id="s-margin" min="0" step="0.5" value="{{ settings.min_margin }}" onchange="updateAllPreviews()">
        </div>
        <div class="field-group">
          <label>Protrusion (mm)</label>
          <input type="number" id="s-protrusion" step="0.1" value="{{ settings.text_protrusion }}" onchange="updateAllPreviews()">
        </div>
      </div>

      <h2>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-3M9.707 3.293l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L9.414 7H17a2 2 0 012 2v1"/></svg>
        Style
      </h2>

      <div class="grid">
        <div class="field-group">
          <label>Background Color</label>
          <input type="color" id="s-bg-color" value="{{ settings.bg_color }}" oninput="updateAllPreviews()">
        </div>
        <div class="field-group">
          <label>Text Color</label>
          <input type="color" id="s-text-color" value="{{ settings.text_color }}" oninput="updateAllPreviews()">
        </div>
      </div>

      <div class="field-group">
        <label>Font Family</label>
        <div class="custom-dropdown" id="font-dropdown">
          <div class="dropdown-trigger" id="dropdown-trigger" onclick="toggleDropdown()">
            <span id="trigger-label">— Select Font —</span>
          </div>
          <div class="dropdown-content" id="dropdown-content">
            <div class="dropdown-search">
              <input type="text" id="font-search" placeholder="Search fonts..." oninput="filterFonts(this.value)">
            </div>
            <div class="dropdown-list" id="font-list">
              {% for f in fonts %}
              <div class="dropdown-option" 
                   data-path="{{ f.path }}" 
                   data-name="{{ f.name }}"
                   data-family="FontPreview_{{ loop.index }}"
                   style="font-family: 'FontPreview_{{ loop.index }}';"
                   onclick="selectFont('{{ f.path }}', '{{ f.name }}', 'FontPreview_{{ loop.index }}')">
                {{ f.name }}
              </div>
              {% endfor %}
            </div>
          </div>
          <input type="hidden" id="s-font" value="{{ settings.font_path }}">
        </div>
      </div>

      <div class="card" style="padding: 1.5rem;">
          <h2 style="margin-bottom: 1rem;">Stats</h2>
          <div id="stats-info" style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.8;">
              Font Size: <span id="stat-font-size" style="color: var(--text); font-weight: 700;">—</span><br>
              Signs: <span id="stat-count" style="color: var(--text);">—</span><br>
              <div id="stat-limit-box" style="margin-top: 0.5rem; display: none;">
                  Limited by: <span id="stat-limit" style="color: #ff9800; font-weight: 700;">—</span>
              </div>
          </div>
      </div>
    </div>
  </div>

  <!-- ═══ RIGHT COLUMN: CONTENT & EXPORT ═══ -->
  <div class="preview-column">
    <div class="preview-container" style="gap: 2rem;">
      
      <!-- Texts (White Card) -->
      <div class="white-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
          <h2 style="margin: 0; font-size: 1.25rem;">Sign Texts</h2>
          <div style="display: flex; gap: 0.5rem;">
            <button class="btn btn-secondary btn-icon" onclick="removeLastEntry()" title="Remove">－</button>
            <button class="btn btn-secondary btn-icon" onclick="addEntry()" title="Add">＋</button>
          </div>
        </div>
        
        <div id="entries" class="entry-list"></div>
      </div>

      <!-- Export Card -->
      <div class="card">
        <h2>Export Package</h2>
        <div class="grid" style="grid-template-columns: 1fr auto; align-items: end; gap: 1.5rem;">
          <div class="field-group" style="margin: 0;">
            <label>Export Format</label>
            <select id="s-format" onchange="markDirty()">
              <option value="3mf">3MF (Bambu/Prusa Multi-Color)</option>
              <option value="step">STEP (Universal CAD / Colors)</option>
            </select>
          </div>
          
          <button id="gen-btn" class="btn btn-success" onclick="doGenerate()">
            <div class="loader"></div>
            <span id="gen-btn-text">🚀 Generate & Download All</span>
          </button>
        </div>
        
        <div id="status-toast" class="status-toast" style="margin-top: 1rem;"></div>
      </div>

    </div>
  </div>

</div>

<script>
  let currentFontFamily = "sans-serif";
  let previewTimeout = null;
  let lastGeneratedState = null;

  // --- Premium Font Dropdown Logic ---
  function initFonts() {
    const styleEl = document.getElementById('dynamic-fonts');
    const options = document.querySelectorAll('.dropdown-option');
    let css = "";
    
    options.forEach((opt, idx) => {
      const path = opt.getAttribute('data-path');
      const fontUrl = `/api/font?path=${encodeURIComponent(path)}`;
      css += `
        @font-face {
          font-family: 'FontPreview_${idx + 1}';
          src: url('${fontUrl}');
        }
      `;
      
      // Set initial trigger state
      if (path === document.getElementById('s-font').value) {
         const family = `FontPreview_${idx + 1}`;
         currentFontFamily = family;
         setTrigger(opt.getAttribute('data-name'), family);
         opt.classList.add('selected');
      }
    });
    styleEl.innerHTML = css;
    updateInputFonts();
  }

  function toggleDropdown() {
    const content = document.getElementById('dropdown-content');
    const trigger = document.getElementById('dropdown-trigger');
    const isOpen = content.classList.contains('show');
    
    // Close all first
    document.querySelectorAll('.dropdown-content').forEach(c => c.classList.remove('show'));
    document.querySelectorAll('.dropdown-trigger').forEach(t => t.classList.remove('active'));

    if (!isOpen) {
      content.classList.add('show');
      trigger.classList.add('active');
      document.getElementById('font-search').focus();
    }
  }

  function setTrigger(name, family) {
    const label = document.getElementById('trigger-label');
    label.textContent = name;
    label.style.fontFamily = family;
  }

  function updateInputFonts() {
    document.querySelectorAll('.entry-item input').forEach(input => {
      input.style.fontFamily = currentFontFamily;
    });
  }

  function selectFont(path, name, family) {
    document.getElementById('s-font').value = path;
    currentFontFamily = family;
    setTrigger(name, family);
    updateInputFonts();
    
    document.querySelectorAll('.dropdown-option').forEach(opt => {
      opt.classList.remove('selected');
      if (opt.getAttribute('data-path') === path) opt.classList.add('selected');
    });

    document.getElementById('dropdown-content').classList.remove('show');
    document.getElementById('dropdown-trigger').classList.remove('active');
    
    onFontChange();
  }

  function filterFonts(query) {
    const q = query.toLowerCase();
    document.querySelectorAll('.dropdown-option').forEach(opt => {
      const name = opt.getAttribute('data-name').toLowerCase();
      opt.style.display = name.includes(q) ? 'block' : 'none';
    });
  }

  // Global click to close
  window.addEventListener('click', (e) => {
    if (!e.target.closest('#font-dropdown')) {
      document.getElementById('dropdown-content').classList.remove('show');
      document.getElementById('dropdown-trigger').classList.remove('active');
    }
  });

  function addEntry(value = "") {
    const container = document.getElementById("entries");
    const idx = container.children.length + 1;
    const div = document.createElement("div");
    div.className = "entry-item";
    div.innerHTML = `
      <input type="text" placeholder="Type here..." value="${escHtml(value)}" oninput="onEntryInput(this)">
      <div class="sign-mini-preview">
        <span style="font-size: 0.6rem; color: var(--text-muted); opacity: 0.5;">Preview</span>
      </div>
    `;
    container.appendChild(div);
    updateAllPreviews();
    markDirty();
  }

  function removeLastEntry() {
    const container = document.getElementById("entries");
    if (container.children.length > 1) {
      container.removeChild(container.lastChild);
      updateAllPreviews();
      markDirty();
    }
  }

  function onEntryInput(inputEl) {
    const container = document.getElementById("entries");
    const isLastRow = inputEl.parentElement === container.lastChild;
    
    // Auto-append row if typing in the last one
    if (isLastRow && inputEl.value.trim() !== "") {
        addEntry();
    }

    markDirty();
    clearTimeout(previewTimeout);
    previewTimeout = setTimeout(() => {
        updateAllPreviews();
        saveSettings();
    }, 400);
  }

  function onFontChange() {
      markDirty();
      updateAllPreviews();
      saveSettings();
  }

  function getTexts() {
    return [...document.querySelectorAll(".entry-item input")].map(i => i.value.trim());
  }

  async function updateAllPreviews() {
    const texts = getTexts().filter(t => t.length > 0);
    if (texts.length === 0) {
        document.getElementById("stat-font-size").textContent = "—";
        document.getElementById("stat-count").textContent = "—";
        document.querySelectorAll(".sign-mini-preview").forEach(mini => {
            mini.innerHTML = `<span style="font-size: 0.6rem; color: #aaa;">Preview</span>`;
        });
        return;
    }

    try {
      const res = await fetch("/api/preview", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ texts, settings: getCurrentSettings() }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      // We removed the large preview box, but we could keep it hidden or use it for something else.
      // For now, it's removed from HTML but let's just make sure we don't crash.
      // document.getElementById("preview-box").innerHTML = data.svg;
      
      // Update Stats & Highlighting
      document.getElementById("stat-font-size").textContent = data.font_size.toFixed(2) + " mm";
      document.getElementById("stat-count").textContent = texts.length;
      
      const limitBox = document.getElementById("stat-limit-box");
      const limitText = document.getElementById("stat-limit");
      if (data.limiting_text) {
          limitBox.style.display = "block";
          limitText.textContent = `"${data.limiting_text}"`;
      } else {
          limitBox.style.display = "none";
      }

      // Update Individual Mini-Previews and Highlight Bottleneck
      const entries = document.querySelectorAll(".entry-item");
      const settings = getCurrentSettings();

      entries.forEach(entry => entry.classList.remove("bottleneck"));

      texts.forEach((txt, idx) => {
          if (entries[idx]) {
              const mini = entries[idx].querySelector(".sign-mini-preview");
              
              // Highlight if this is the limiting sign
              if (txt === data.limiting_text) {
                  entries[idx].classList.add("bottleneck");
              }

              mini.innerHTML = `
                <svg width="100%" height="100%" viewBox="0 0 ${settings.width} ${settings.height}" 
                     preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                  <rect x="0" y="0" width="${settings.width}" height="${settings.height}" fill="${settings.bg_color}" rx="1" ry="1" />
                  <text x="${settings.width/2}" y="${settings.height/2}" fill="${settings.text_color}" 
                        font-family="${currentFontFamily}" font-size="${data.font_size * 0.8}px" 
                        text-anchor="middle" dominant-baseline="central">${escHtml(txt)}</text>
                </svg>
              `;
          }
      });
    } catch (e) {
      console.error("Preview Error:", e);
    }
  }

  function getCurrentSettings() {
    const val = (id, def) => {
        const v = parseFloat(document.getElementById(id).value);
        return isNaN(v) ? def : v;
    };
    
    return {
      width: val("s-width", 120),
      height: val("s-height", 40),
      min_margin: val("s-margin", 3),
      base_thickness: val("s-base-h", 2),
      text_thickness: val("s-text-h", 1.5),
      text_protrusion: val("s-protrusion", 0),
      bg_color: document.getElementById("s-bg-color").value,
      text_color: document.getElementById("s-text-color").value,
      font_path: document.getElementById("s-font").value,
    };
  }

  async function saveSettings() {
    markDirty();
    try {
        await fetch("/api/settings", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(getCurrentSettings()),
        });
    } catch(e) { console.error("Auto-save failed", e); }
  }

  function showToast(msg, type = "info") {
    const t = document.getElementById("status-toast");
    t.className = `status-toast ${type}`;
    t.style.display = "block";
    t.innerHTML = msg;
    setTimeout(() => { t.style.display = "none"; }, 5000);
  }

  function markDirty() {
     document.getElementById("gen-btn-text").textContent = "🚀 Generate & Download All";
  }

  async function doGenerate() {
    const texts = getTexts().filter(t => t.length > 0);
    if (texts.length === 0) return showToast("Please enter some text for the signs.", "error");

    const settings = getCurrentSettings();
    const format = document.getElementById("s-format").value;
    const currentState = JSON.stringify({ texts, settings, format });

    // "Smart" Download: If state is same, just download.
    if (lastGeneratedState === currentState) {
        showToast("Re-downloading existing package...", "info");
        window.location.href = "/api/download";
        return;
    }

    const btn = document.getElementById("gen-btn");
    btn.classList.add("loading");
    btn.disabled = true;

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ texts, format, settings }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      showToast("Generation successful! Downloading...", "success");
      lastGeneratedState = currentState;
      document.getElementById("gen-btn-text").textContent = "⬇️ Download Again";
      window.location.href = "/api/download";
      
    } catch (e) {
      showToast("Error: " + e.message, "error");
    } finally {
      btn.classList.remove("loading");
      btn.disabled = false;
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
  }

  // Init
  initFonts();
  addEntry("SIGN ONE"); 
  addEntry("SIGN TWO");
  addEntry(""); // Start with one empty row
  onFontChange();
</script>

</body>
</html>
